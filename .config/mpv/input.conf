# --- Console ---
Ctrl+` script-binding console/enable

# --- Rotation ---
Ctrl+r cycle-values video-rotate 0 90 180 270
Ctrl+Shift+r set video-rotate 0

# --- Playback ---
SPACE cycle pause
RIGHT seek 5
LEFT seek -5
UP seek 30
DOWN seek -30

# --- Volume (IMPORTANT: separate keys) ---
Ctrl+UP add volume 5
Ctrl+DOWN add volume -5

# --- Fullscreen ---
f cycle fullscreen
